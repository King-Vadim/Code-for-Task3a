<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>GLH.shop - Sign up</title>
    <link rel="stylesheet" href="/static/stylesheet.css" />
    <link rel="icon" href="/static/assets/favicon.png" type="image/png" />
    <style>
        h1 {color: green;}
        .error {color: red;}
    </style>
</head>
<body>
    <header>
        <a href="/"><img src="/static/assets/logo.png" alt="Greenfield Local Hub Logo" class="header-logo" height="200" width="200" /></a>
        <div class="header-nav">
            <div class="mainbuttons">
                <button onclick="document.location='/aboutus'">About us</button>
                <button onclick="document.location='/contactus'">Contact us</button>
                <button onclick="document.location='/shophome'">Shop</button>
            </div>

            <div class="accountbuttons">
                <button onclick="document.location='/login'">Login</button>
            </div>
        </div>
    </header>

    <div class="signupform">
        <h1>Create an account</h1>
        {% if error %}
        <p class="error">{{error}}</p>
        {% endif %}

        <form action="/register" method="post">
            <label for="account-type">Account type</label>
            <select id="account-type" name="account-type">
                <option value="customer">Customer account</option>
                <option value="producer">Producer account</option>
            </select>
            <label for="username">Name</label>
            <input type="text" name="username" placeholder="Enter Name" required />
            <label for="email">Email</label>
            <input type="text" name="email" placeholder="Enter Email" required />
            <label for="password">Password</label>
            <input type="password" name="password" placeholder="Enter Password" required />
            <label for="pswrepeat">Repeat Password</label>
            <input type="password" placeholder="Repeat Password" name="pswrepeat" id="pswrepeat" required />
            <p>By creating an account you agree to our <a href="#">Terms & Privacy Policy</a>.</p>
            <button type="submit">Sign up</button>
            <h1 style="margin-top: 15px;">Already have an account? <a href="/login">Login</a></h1>
        </form>
    </div>

    <footer>
        <a href="/"><img src="/static/assets/logo.png" height="400px" width="400px" /></a>

        <div class="sitemap">
            <h1>Sitemap</h1>
            <a href="/">Home</a>
            <a href="/contactus">Contact us</a>
            <a href="/aboutus">About us</a>
            <a href="/shophome">Shop</a>
        </div>

    </footer>
</body>
</html>
