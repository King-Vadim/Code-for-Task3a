<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>GLH.shop - Dashboard</title>
    <link rel="stylesheet" href="/static/stylesheet.css" />
    <link rel="icon" href="/static/assets/favicon.png" type="image/png" />
    <meta name="google" content="notranslate" />
</head>
<body>
    <header>
        <a href="/"><img src="/static/assets/logo.png" alt="Greenfield Local Hub Logo" class="header-logo" height="200" width="200" /></a>
        <div class="header-nav">
            <div class="mainbuttons">
                <button onclick="document.location='/aboutus'">About us</button>
                <button onclick="document.location='/contactus'">Contact us</button>
                <button onclick="document.location='/shophome'">Shop</button>
            </div>

            <div class="accountbuttons">
                {% block navbar %}
                {% if current_user.is_authenticated %}
                <button onclick="document.location='/logout'">Logout</button>
                <button id="shoppingcartbutton">Shopping cart</button>
                {% block navdashboard%}
                {% if current_user.accounttype == 'customer' %}
                <button onclick="document.location='/cdashboard'">Dashboard</button>
                {% else %}
                <button onclick="document.location='/pdashboard'">Dashboard</button>
                {% endif %}
                {% endblock %}
                {% else %}
                <button onclick="document.location='/register'">Sign up</button>
                <button onclick="document.location='/login'">Log in</button>
                {% endif %}
                {% endblock %}
            </div>
        </div>

    </header>

    <div id="sc-modal" class="sc-modal">
        <div class="shoppingcart-content">
            <span class="close">&times;</span>
            <p>Text. Text. Text.</p>
            <p>Text. Text. Text.</p>
        </div>
    </div>

    <div style="margin-top: 250px; margin-bottom: 125px;" class="product-add">
        <form action="/pdashboardadd" method="post">
            <label for="product-type">Product type</label>
            <select id="product-type" name="product-type">
                <option value="Organic Vegetable">Organic Vegetables</option>
                <option value="Organic Fruit">Organic Fruit</option>
                <option value="Alcoholic Drinks">Alcoholic Drinks</option>
                <option value="Antipasti Foods">Antipasti Foods</option>
                <option value="Baking, Sugars & Syrups">Baking, Sugars & Syrups</option>
                <option value="Biscuits & Cakes">Biscuits & Cakes</option>
                <option value="Breads, Crackers & Savoury Biscuits">Breads, Crackers & Savoury Biscuits</option>
                <option value="Breakfast Cereals & Porridge">Breakfast Cereals & Porridge</option>
                <option value="Chilled & Eggs">Chilled & Eggs</option>
                <option value="Chocolates & Sweets">Chocolates & Sweets</option>
                <option value="Savoury Snacks">Savoury Snacks</option>
                <option value="Dried Beans & Pulses">Dried Beans & Pulses</option>
                <option value="Dried Fruit">Dried Fruit</option>
                <option value="Dried herbs & Spices">Dried Herbs & Spices</option>
                <option value="Fruit Juices, Cordial & Soft Drinks">Fruit Juices, Cordial & Soft Drinks</option>
                <option value="Grains & Pseudo Grains">Grains (& Pseudo Grains)</option>
                <option value="Nuts & Seeds">Nuts & Seeds</option>
                <option value="Oils">Oils</option>
                <option value="Pasta, Rice & Noodle">Pasta, Rice & Noodles</option>
                <option value="Plant Milks & Creams">Plant Milks & Creams</option>
                <option value="Preserves, Spreads & Nut Butters">Preserves, Spreads & Nut Butters</option>
                <option value="Ready Meals & Soups">Ready Meals & Soups</option>
                <option value="Seasonings & Condiments">Seasonings & Condiments</option>
                <option value="Hot Drinks">Hot Drinks</option>
                <option value="Tinned Food">Tinned food</option>
                <option value="Body Care">Body care</option>
                <option value="Household">Household</option>
                <option value="Other">Other</option>
            </select>
            <label for="pname">Product Name</label>
            <input type="text" name="pname" placeholder="Enter Product Name" required />
            <label for="price">Product Price</label>
            <input type="number" name="price" step="0.01" placeholder="Enter Price Here" required />
            <label for="pdesc">Product Description</label>
            <input type="text" name="desc" placeholder="Type a Short Description" required />
            <button type="submit">Add</button>
        </form>
    </div>

    <button onclick="document.location='/pdashboard'" style="display: flex; justify-content: center; align-items: center; margin:auto; margin-bottom: 125px;">Cancel</button>

    <footer>
        <a href="/"><img src="/static/assets/logo.png" height="400px" width="400px" /></a>

        <div class="sitemap">
            <h1>Sitemap</h1>
            <a href="/">Home</a>
            <a href="/contactus">Contact us</a>
            <a href="/aboutus">About us</a>
            <a href="/shophome">Shop</a>
        </div>

    </footer>
    <script src="/static/shopping-cart.js"></script>
</body>
</html>
